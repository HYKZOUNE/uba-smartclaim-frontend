<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#d71920" />

  <title>UBA SmartClaim</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    html,body{
      width:100%;
      min-height:100%;
      overflow-x:hidden;
      font-family:Arial,sans-serif;
      background:#f8f9fa;
    }

    #root{
      width:100%;
      min-height:100vh;
    }

    img{
      max-width:100%;
      height:auto;
    }

    input,button,select,textarea{
      max-width:100%;
      font-size:16px;
    }

    @media (max-width:768px){
      #root{
        padding:8px;
      }
    }
  </style>
</head>

<body>
  <div id="root"></div>
</body>
</html>
